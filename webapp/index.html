<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Buscador do acervo de newsletters de tecnologia — filtros por fonte, período e tags, com busca por IA."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Acervo — buscador de newsletters</title>
    <script>
      // Tema ANTES do 1º paint (zero FOUC): a escolha salva vence; sem escolha salva, o CSS
      // segue prefers-color-scheme (o bloco @media dos tokens cobre). Mesmo mecanismo do
      // web-ui do CLI. Inline de propósito — precisa rodar antes de qualquer CSS/JS do bundle.
      try {
        var t = localStorage.getItem('nc-theme');
        if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
      } catch (e) {}
      // Idioma ANTES do 1º paint: escolha salva vence; senão, só português vira pt-BR e
      // QUALQUER outro idioma cai em inglês. Mesma regra do resolveLocale() em i18n.jsx.
      try {
        var l = localStorage.getItem('nc-locale');
        if (l !== 'pt' && l !== 'en') {
          var nav = (navigator.languages && navigator.languages[0]) || navigator.language || 'en';
          l = String(nav).toLowerCase().split('-')[0] === 'pt' ? 'pt' : 'en';
        }
        document.documentElement.lang = l === 'pt' ? 'pt-BR' : 'en';
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
